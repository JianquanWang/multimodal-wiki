<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multimodal AI Guide | 多模态AI指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg:#0a0a0f;--bg2:#0f0f1a;--card:#13131f;--card2:#1a1a2e;
  --border:#2a2a3e;--text:#e0e0f0;--text2:#8888aa;--text3:#555566;
  --accent:#6c8aff;--accent2:#9b6dff;--accent3:#4ecdc4;
  --green:#4ade80;--yellow:#fbbf24;--red:#f87171;
  --c1:#6c8aff;--c2:#9b6dff;--c3:#4ecdc4;--c4:#fbbf24;
  --c5:#f87171;--c6:#fb923c;--c7:#f472b6;--c8:#22d3ee;--c9:#a78bfa;
  --c10:#34d399;--c11:#f59e0b;--c12:#ec4899;--c13:#8b5cf6;--c14:#14b8a6;
  --c15:#f97316;--c16:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

/* ── TOPIC NAV ── */
.topic-nav{position:sticky;top:0;z-index:300;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;}
.topic-nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:0;}
.topic-logo{font-size:0.9rem;font-weight:800;color:var(--text);white-space:nowrap;padding-right:20px;border-right:1px solid var(--border);margin-right:16px;flex-shrink:0;}
.topic-logo span{color:var(--accent);}
.topic-tabs{display:flex;gap:2px;}
.topic-tab{padding:14px 18px;font-size:0.82rem;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;}
.topic-tab:hover{color:var(--text);}
.topic-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.topic-spacer{flex:1;}
.lang-wrap{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:3px 5px;flex-shrink:0;}
.lang-btn{padding:4px 12px;border-radius:16px;border:none;background:transparent;color:var(--text2);font-family:'Inter',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
.lang-btn.active{background:var(--accent);color:#fff;}

/* ── HERO ── */
.hero{text-align:center;padding:60px 20px 40px;background:linear-gradient(180deg,#0f0f1a 0%,var(--bg) 100%);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(108,138,255,0.12) 0%,transparent 70%);pointer-events:none;}
.hero h1{font-size:clamp(1.6rem,4vw,2.8rem);font-weight:800;margin-bottom:10px;}
.hero h1 .accent{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero p{font-size:0.92rem;color:var(--text2);max-width:640px;margin:0 auto 18px;}
.hero-meta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:0.78rem;color:var(--text3);}
.hero-meta span{display:flex;align-items:center;gap:5px;}

/* ── SEARCH / FILTER BAR ── */
.nav-wrap{position:sticky;top:53px;z-index:100;background:rgba(10,10,15,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-inner{max-width:1300px;margin:0 auto;padding:10px 20px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;position:relative;}
.search-box input{width:100%;padding:7px 10px 7px 32px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.78rem;}
.bench-filter-indicator{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:0.68rem;color:var(--accent3);display:none;white-space:nowrap;}
.bench-filter-indicator.active{display:flex;align-items:center;gap:3px;}

.cat-filters{display:flex;gap:4px;flex-wrap:wrap;}
.cat-btn{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.75rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.cat-btn:hover{border-color:var(--accent);color:var(--text);}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── CONTAINER ── */
.container{max-width:1300px;margin:0 auto;padding:32px 20px 48px;}

/* ── TOC ── */
.toc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;margin-bottom:28px;}
.toc h2{font-size:0.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;}
.toc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:8px;text-decoration:none;color:var(--text);font-size:0.78rem;transition:all 0.2s;border:1px solid transparent;}
.toc-item:hover{border-color:var(--border);background:var(--card2);}

/* ── SECTIONS ── */
.section{margin-bottom:44px;}
.cat-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.cat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.cat-info{flex:1;}
.cat-title{font-size:1rem;font-weight:700;line-height:1.3;}
.cat-desc{font-size:0.75rem;color:var(--text2);margin-top:2px;}
.subtopics{margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;}
.subpill{padding:2px 8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:5px;font-size:0.67rem;color:var(--text3);}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:all 0.22s;display:flex;flex-direction:column;gap:6px;cursor:pointer;}
.card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.4);}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.card-title{font-size:0.84rem;font-weight:700;line-height:1.3;flex:1;}
.card-badge{font-size:0.63rem;padding:2px 7px;border-radius:16px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.bg{background:rgba(74,222,128,0.1);color:var(--green);border:1px solid rgba(74,222,128,0.18);}
.by{background:rgba(251,191,36,0.1);color:var(--yellow);border:1px solid rgba(251,191,36,0.18);}
.br{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.18);}
.card-cn{font-size:0.72rem;color:var(--text3);}
.card-desc{font-size:0.78rem;color:var(--text2);line-height:1.5;flex:1;}
.card-ref{font-size:0.7rem;color:var(--accent);opacity:0.7;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-hint{font-size:0.66rem;color:var(--text3);display:flex;align-items:center;gap:4px;}
.card-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.ctag{font-size:0.63rem;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:var(--text3);}
.hidden{display:none!important;}

/* ── BENCHMARK ── */
.bench-title{font-size:0.75rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.bench-table{width:100%;border-collapse:collapse;font-size:0.75rem;margin-bottom:4px;}
.bench-table th{text-align:left;padding:6px 10px;background:rgba(255,255,255,0.04);color:var(--text3);font-weight:600;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);}
.bench-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text2);}
.bench-table tr:last-child td{border-bottom:none;}
.bench-table td:first-child{color:var(--accent);font-weight:600;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:18px;max-width:620px;width:100%;max-height:84vh;overflow-y:auto;padding:26px 30px;position:relative;transform:translateY(18px);transition:transform 0.25s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-close{position:absolute;top:12px;right:14px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:7px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.85rem;transition:all 0.2s;}
.modal-close:hover{color:var(--text);border-color:var(--accent);}
.modal-badge{display:inline-block;font-size:0.7rem;padding:2px 10px;border-radius:16px;margin-bottom:10px;}
.modal-ptitle{font-size:1.15rem;font-weight:800;margin-bottom:2px;line-height:1.3;}
.modal-pcn{font-size:0.78rem;color:var(--text3);margin-bottom:12px;}
.modal-div{height:1px;background:var(--border);margin:12px 0;}
.modal-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:5px;}
.modal-text{font-size:0.84rem;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.modal-paper{background:rgba(108,138,255,0.06);border:1px solid rgba(108,138,255,0.14);border-radius:10px;padding:10px 12px;margin-bottom:12px;}
.modal-pub{display:flex;gap:8px;align-items:flex-start;}
.modal-picon{color:var(--accent);font-size:0.9rem;margin-top:2px;flex-shrink:0;}
.modal-pname{font-size:0.82rem;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;line-height:1.4;}
.modal-pvenue{font-size:0.72rem;color:var(--text3);margin-top:2px;}
.modal-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border-radius:9px;text-decoration:none;font-size:0.78rem;font-weight:600;transition:all 0.2s;}
.modal-btn:hover{background:var(--accent2);transform:translateY(-1px);}
.modal-tags2{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.modal-ctag{font-size:0.7rem;padding:2px 8px;border-radius:5px;background:rgba(255,255,255,0.05);color:var(--text3);}
.modal-related{display:flex;flex-direction:column;gap:5px;margin-top:6px;}
.modal-rel-item{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:7px;cursor:pointer;font-size:0.8rem;transition:all 0.2s;}
.modal-rel-item:hover{border-color:var(--accent);background:rgba(108,138,255,0.06);}
.modal-rel-title{flex:1;font-weight:600;}
.modal-rel-badge{font-size:0.63rem;padding:2px 7px;border-radius:12px;flex-shrink:0;}
.modal-rel-more{font-size:0.75rem;color:var(--text3);text-align:center;padding:4px;cursor:pointer;}
.modal-rel-more:hover{color:var(--accent);}
.modal-cross-topics{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.modal-cross-topic{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:10px 12px;}
.modal-cross-topic-label{font-size:0.75rem;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.modal-cross-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;border-radius:5px;cursor:pointer;font-size:0.79rem;transition:all 0.15s;margin-bottom:2px;}
.modal-cross-item:hover{background:rgba(108,138,255,0.1);}
.modal-cross-item span:first-child{flex:1;font-weight:600;}
.modal-cross-badge{font-size:0.62rem;padding:1px 6px;border-radius:10px;flex-shrink:0;}

/* ── BENCHMARKS PAGE ── */
#benchmarks-page{display:none;}
#benchmarks-page.active{display:block;}
.bench-page{margin-top:28px;}
.bench-page-title{font-size:1.2rem;font-weight:800;margin-bottom:6px;}
.bench-page-desc{font-size:0.8rem;color:var(--text3);margin-bottom:20px;}
.bench-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:20px;}
.bench-tab{padding:6px 14px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.78rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;font-weight:500;}
.bench-tab:hover{border-color:var(--accent);color:var(--text);}
.bench-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.bench-cat{display:none;}
.bench-cat.active{display:block;}
.bar-chart{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-label{flex:0 0 160px;font-size:0.76rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-wrap{flex:1;background:rgba(255,255,255,0.05);border-radius:5px;height:24px;position:relative;overflow:hidden;}
.bar-fill{height:100%;border-radius:5px;transition:width 0.5s ease;display:flex;align-items:center;padding-left:7px;}
.bar-fill span{font-size:0.68rem;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.5);}
.bar-value{flex:0 0 72px;text-align:right;font-size:0.74rem;color:var(--text2);font-family:'JetBrains Mono',monospace;}
.bench-source{font-size:0.68rem;color:var(--text3);margin-top:16px;padding-top:10px;border-top:1px solid var(--border);}

/* ── TAGS PAGE ── */
#tags-page{display:none;}
#tags-page.active{display:block;}
.tags-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:24px;}
.tag-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.22s;}
.tag-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.tag-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.tag-name{font-size:0.84rem;font-weight:700;}
.tag-count{padding:2px 9px;border-radius:16px;background:rgba(255,255,255,0.05);color:var(--text3);font-size:0.7rem;font-weight:600;}
.tag-items{display:flex;flex-wrap:wrap;gap:4px;}
.tag-item-chip{font-size:0.7rem;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border);}
.tag-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.tag-modal-overlay.open{opacity:1;pointer-events:all;}
.tag-modal{background:var(--card2);border:1px solid var(--border);border-radius:18px;max-width:540px;width:100%;max-height:76vh;overflow-y:auto;padding:24px 28px;position:relative;transform:translateY(18px);transition:transform 0.25s;}
.tag-modal-overlay.open .tag-modal{transform:translateY(0);}
.tag-modal h3{font-size:1.05rem;font-weight:700;margin-bottom:12px;}
.tag-modal-list{display:flex;flex-direction:column;gap:7px;}
.tag-modal-item{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:0.84rem;transition:all 0.2s;}
.tag-modal-item:hover{border-color:var(--accent);}

/* ── SUB-TAB NAV (Benchmarks / Tags) ── */
.subtab-bar{display:flex;gap:4px;margin-bottom:20px;}
.subtab-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);font-size:0.78rem;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;}
.subtab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── FOOTER ── */
footer{text-align:center;padding:28px 20px;color:var(--text3);font-size:0.76rem;border-top:1px solid var(--border);margin-top:32px;}
</style>
</head>
<body>

<!-- ── TOPIC NAV ── -->
<div class="topic-nav">
  <div class="topic-nav-inner">
    <div class="topic-logo"><span>MAG</span>.wiki</div>
    <div class="topic-tabs">
      <button class="topic-tab active" data-topic="llm">LLM</button>
      <button class="topic-tab" data-topic="vlm">VLM</button>
      <button class="topic-tab" data-topic="vla">VLA</button>
      <button class="topic-tab" data-topic="world">World Models</button>
    </div>
    <div class="topic-spacer"></div>
    <div class="lang-wrap">
      <button class="lang-btn active" id="langCN">中文</button>
      <button class="lang-btn" id="langEN">EN</button>
    </div>
  </div>
</div>

<!-- ── HERO ── -->
<div class="hero">
  <h1 id="heroTitle"></h1>
  <p id="heroDesc"></p>
  <div class="hero-meta">
    <span><i class="fas fa-layer-group"></i> <span id="heroCat"></span></span>
    <span><i class="fas fa-bolt"></i> <span id="heroTech"></span></span>
    <span><i class="fas fa-file-alt"></i> <span id="heroPapers"></span></span>
    <span><i class="fas fa-signal"></i> <span id="heroBench"></span></span>
    <span id="heroFiltered" style="display:none;color:var(--accent3)"><i class="fas fa-filter"></i> <span></span></span>
  </div>
</div>

<!-- ── SEARCH / FILTER ── -->
<div class="nav-wrap">
  <div class="nav-inner">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="">
      <div class="bench-filter-indicator" id="benchFilterInd"><i class="fas fa-filter"></i><span></span></div>
    </div>
    <div class="cat-filters" id="catFilters"></div>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="container">
  <div class="subtab-bar">
    <button class="subtab-btn active" data-subtab="main" id="subtabMain"><i class="fas fa-th-large"></i> <span id="subtabMainLabel">技术</span></button>
    <button class="subtab-btn" data-subtab="bench" id="subtabBench"><i class="fas fa-chart-bar"></i> <span id="subtabBenchLabel">排行榜</span></button>
    <button class="subtab-btn" data-subtab="tags" id="subtabTags"><i class="fas fa-tags"></i> <span id="subtabTagsLabel">标签</span></button>
  </div>
  <div class="toc" id="toc">
    <h2 id="tocTitle"></h2>
    <div class="toc-grid" id="tocGrid"></div>
  </div>
  <div id="sections"></div>
  <div id="noResults" style="display:none;text-align:center;padding:60px 20px;color:var(--text3)">
    <i class="fas fa-search" style="font-size:2rem;margin-bottom:12px;display:block;opacity:0.5"></i>
    <div style="font-size:1rem;font-weight:600;margin-bottom:6px" id="noResultsText"></div>
    <div style="font-size:0.8rem" id="noResultsHint"></div>
  </div>

  <!-- ── BENCHMARKS PAGE ── -->
  <div id="benchmarks-page">
    <div class="bench-page-title" id="benchPageTitle"></div>
    <div class="bench-page-desc" id="benchPageDesc"></div>
    <div class="bench-tabs" id="benchTabs"></div>
    <div id="benchContent"></div>
  </div>

  <!-- ── TAGS PAGE ── -->
  <div id="tags-page">
    <div class="bench-page-title"><i class="fas fa-tags" style="color:var(--accent2)"></i> <span id="tagsPageTitle"></span></div>
    <div class="bench-page-desc" id="tagsPageDesc"></div>
    <div class="search-box" id="tagSearchBox" style="max-width:400px;margin-bottom:16px">
      <i class="fas fa-search"></i>
      <input type="text" id="tagSearchInput" placeholder="" style="background:var(--card)">
    </div>
    <div class="tags-grid" id="tagsGrid"></div>
  </div>

  {id:101,name:"LLaVA (Large Language & Vision Assistant)",cn:"LLaVA 大型视觉-语言助手",
   desc_cn:"开源VLM标杆，LLaMA+Vicuna作为语言 backbone，CLIP ViT作为视觉encoder，通过projection layer连接。在 8xA100 上完成训练，仅用 1.2M 数据。",

  {id:104,name:"InternVL (1 / 2 / 3)",cn:"InternVL 视觉大模型",
   desc_cn:"上海AI Lab开源最强开源VLM之一。Progressive Calibration训练模式（从小模型到大模型逐步释放参数），InternVL3引入MLLM-Freeze+CoFi技术。",

   arxiv:"https://arxiv.org/abs/2312.12086",badge:"🟡",diff:"Intermediate",categories:[2,3],
   bench:[{m:"InternVL3 78B",metric:"VQAv2",ds:"78B",v:"85.1%",n:"vs 82.0% LLaVA-1.5"}]},
  {id:105,name:"BLIP-2 / INSTRUCTBLIP",cn:"BLIP-2 / INSTRUCTBLIP",
   desc_cn:"通过轻量级Q-Former实现冻住视觉编码器和LLM之间的高效对齐。BLIP-2用coco captions + LAION训练，InstructBLIP在指令微调后支持开放域多模态指令。",
   desc_en:"Lightweight Q-Former aligns frozen vision encoder and LLM. BLIP-2 trained on COCO captions + LAION. InstructBLIP adds instruction fine-tuning for open-domain multimodal instructions.",
   paper:"Li et al., 3/2023 — BLIP-2 — arXiv:2301.12597; 2023 — InstructBLIP",

  {id:106,name:"Flamingo / OpenFlamingo",cn:"Flamingo 门控注意力VLM",
   desc_cn:"DeepMind的原始门控注意力VLM，冻住视觉编码器和语言模型，中间插入门控注意力层实现少样本学习。OpenFlamingo是开源复现。",
   desc_en:"DeepMind's original gated attention VLM. Frozen vision + language models with gated attention layers in between for few-shot learning. OpenFlamingo is open-source reproduction.",

  {id:107,name:"CLIP / OpenCLIP",cn:"CLIP 对比语言-图像预训练",

   arxiv:"https://arxiv.org/abs/2103.00020",badge:"🟢",diff:"Beginner",categories:[5],

  {id:108,name:"GLIPv1 / GLIPv2",cn:"GLIP grounded VL理解",

   desc_en:"Grounded Language-Image Pre-training unifies object detection and language understanding. GLIPv2 adds semantic augmentation + self-training, 58.7% box AP on COCO.",

   arxiv:"https://arxiv.org/abs/2112.00171",badge:"🟡",diff:"Intermediate",categories:[5,3],
   bench:[{m:"GLIPv2 59B",metric:"COCO box AP",ds:"59B",v:"58.7%",n:"COCO 2017 val"}]},
  {id:109,name:"Grounding DINO / Grounding SAM",cn:"Grounding DINO / SAM",
   desc_cn:"开集目标检测（SOTA），DINO+MGD（最大语义的等变匹配）实现给定文本框任意物体。Grounding SAM结合SAM实现分割+检测统一。",
   desc_en:"Open-set object detection SOTA. DINO + MGD (Maximum Semantic Equivariant Matching) detects any object given text. Grounding SAM combines with SAM for unified detection+segmentation.",
   paper:"Liu et al., 2023 — Grounding DINO — arXiv:2303.05499; 2023 — Grounding SAM",
   arxiv:"https://arxiv.org/abs/2303.05499",badge:"🟡",diff:"Intermediate",categories:[5],

  {id:110,name:"Latent Diffusion Models (LDM)",cn:"潜在扩散模型 LDM",
   desc_cn:"在VAE latent space而非像素空间做diffusion，大幅降低计算量。Stable Diffusion的核心技术。SDXL通过双路骨干网和更好的conditioning进一步提升。",
   desc_en:"Diffusion in VAE latent space instead of pixel space. Massive compute reduction. Core of Stable Diffusion. SDXL improves with two-scale backbone and better conditioning.",
   paper:"Rombach et al., 2022 — LDM — CVPR 2022 — arXiv:2112.10752",
   arxiv:"https://arxiv.org/abs/2112.10752",badge:"🟡",diff:"Intermediate",categories:[6],
   bench:[{m:"SDXL",metric:"FID",ds:"512px",v:"23.9",n:"vs 34.9 SD 1.5"}]},
  {id:111,name:"LCM (Latent Consistency Models)",cn:"LCM 潜在一致性模型",
   desc_cn:"蒸馏一致性模型到4步生成，大幅加速SD/LDMs的采样过程。SD-Turbo/Lucid Rift实现单步~2步推理，实时图像生成。",

   bench:[{m:"LCM SD-Turbo",metric:"Steps",ds:"512px",v:"1 step",n:"vs 25 steps SD 1.5"}]},
  {id:112,name:"Dynamic ViT / Token Merging",cn:"Dynamic ViT / Token合并",
   desc_cn:"通过轻量级routing机制或token merging减少ViT中的冗余visual tokens。Dynamic ViT预测每个token的重要性并丢弃不重要token；ToMe自动合并相似的token。",
   desc_en:"Reduces redundant visual tokens in ViT via lightweight routing or token merging. Dynamic ViT predicts token importance and drops unimportant ones; ToMe auto-merges similar tokens.",
   paper:"Rao et al., 2022 — Dynamic ViT — arXiv:2203.13427; Bolya et al., 2023 — ToMe — ICCV 2023",
   arxiv:"https://arxiv.org/abs/2203.13427",badge:"🟡",diff:"Intermediate",categories:[1],
   bench:[{m:"Dynamic ViT-H",metric:"FLOPs",ds:"ViT-H",v:"-40%",n:"vs ViT-H full tokens"}]},
  {id:113,name:"Svit (Swin Transformer ViT)",cn:"Swin Transformer V2",
   desc_cn:"Swin V2通过shifted window attention解决Swin V1的固定窗口限制，支持更高分辨率和更大的各向异性。节省~50%训练显存。",

   bench:[{m:"SwinV2-L",metric:"ImageNet",ds:"384px",v:"90.2%",n:"vs 89.8% SwinV1-L"}]},
  {id:114,name:"TimeSformer / SlowFast",cn:"TimeSformer / SlowFast 视频",
   desc_cn:"TimeSformer将Transformer应用于时空注意力（divided space-time attention），SlowFast用双路网络分别捕捉短时精细动作和长时语义。高效版FastSlow推出。",

   arxiv:"https://arxiv.org/abs/2103.15691",badge:"🟡",diff:"Intermediate",categories:[7],

  {id:115,name:"VLM Quantization (VLLM-VLM / LLaVA.cpp)",cn:"VLM 量化推理",

   arxiv:"https://arxiv.org/abs/2405.18081",badge:"🟢",diff:"Beginner",categories:[4],
   bench:[{m:"LLaVA-7B Q4",metric:"Memory",ds:"7B",v:"4.2GB",n:"vs 14GB FP16"}]},
  {id:116,name:"Gemini / GPT-4V Architecture Insights",cn:"Gemini / GPT-4V 架构洞察",
   desc_cn:"Gemini原生多模态（不是拼凑），使用Pathways架构并行处理文本、图像、音频、视频。注意力在token-level统一，训练效率比单独模型高~10x。",

   arxiv:"",badge:"🔴",diff:"Advanced",categories:[2,3],
   bench:[{m:"Gemini Ultra",metric:"MMLU",ds:"Ultra",v:"90.0%",n:"5-shot MMLU"}]},
  {id:117,name:"MiniGPT-4 / MiniGPT-v2",cn:"MiniGPT-4 / MiniGPT-v2",
   desc_cn:"仅用一个投影层将冻结的视觉编码器连接到冻结的LLaMA，训练成本极低。v2进一步引入词汇表扩展和视觉专家微调，支持128K上下文。",

   paper:"Zhu et al., 2023 — MiniGPT-4 — arXiv:2305.15072; Chen et al., 2023 — MiniGPT-v2 — arXiv:2310.09478",
   arxiv:"https://arxiv.org/abs/2305.15072",badge:"🟢",diff:"Beginner",categories:[2,3],
   bench:[{m:"MiniGPT-4 7B",metric:"COCO Caption",ds:"7B",v:"77.4%",n:"BLEU-4 captioning"}]},
  {id:118,name:"CogVLM (Sophgo)",cn:"CogVLM 视觉-语言融合",
   desc_cn:"通过深层注意力实现视觉token和语言token的深度融合，而非仅在输入层投影。训练时视觉和语言参数同时更新，深度融合使多模态理解能力大幅提升。",
   desc_en:"Deep fusion of vision and language tokens via deep attention — not just input-layer projection. Both vision and language params updated during training. Deep fusion dramatically improves multimodal understanding.",
   paper:"Wang et al., 2023 — CogVLM — arXiv:2311.03079",
   arxiv:"https://arxiv.org/abs/2311.03079",badge:"🟡",diff:"Intermediate",categories:[2,3],
   bench:[{m:"CogVLM-17B",metric:"VQAv2",ds:"17B",v:"84.2%",n:"architecture-level fusion"}]},
  {id:119,name:"Prismatic VLM (SUN)",cn:"Prismatic VLM 多视觉编码器",
   desc_cn:"支持多个视觉编码器（SigLIP / DINOv2 / SigLIP+SAM）组合使用，通过mean pooling实现late fusion。LLaVA和OpenVLA的backbone。",
   desc_en:"Supports multiple vision encoders (SigLIP / DINOv2 / SigLIP+SAM) combined via mean pooling for late fusion. Backbone of LLaVA and OpenVLA.",

   arxiv:"https://arxiv.org/abs/2405.17398",badge:"🟡",diff:"Intermediate",categories:[1,2],
   bench:[{m:"Prismatic 7B",metric:"GQA",ds:"7B",v:"85.2%",n:"multi-encoder fusion"}]},
  {id:120,name:"VILA (LVM for VLM)",cn:"VILA 视觉语言模型预训练",
   desc_cn:"LVM思想应用于VLM，通过image token reconstruction + language modeling联合训练。v1支持8B/13B/33B，v2引入更强的in-context learning和多图像推理。",
   desc_en:"LVM ideas applied to VLM. Jointly trains image token reconstruction + language modeling. v1 supports 8B/13B/33B; v2 adds stronger in-context learning and multi-image reasoning.",
   paper:"Lin et al., 2024 — VILA — arXiv:2402.18630",
   arxiv:"https://arxiv.org/abs/2402.18630",badge:"🟡",diff:"Intermediate",categories:[3,5],
   bench:[{m:"VILA-13B",metric:"OK-VQA",ds:"13B",v:"68.3%",n:"multi-image reasoning"}]},
  {id:121,name:"Emu3 (Bytedance)",cn:"Emu3 多模态自回归生成",
   desc_cn:"ByteDance的自回归多模态模型，用OmniFusion解码器统一视觉、语言、音频生成。在视觉生成任务上超越DALL-E 3和Sora。",
   desc_en:"ByteDance's autoregressive multimodal model. Uses OmniFusion decoder to unify vision, language, audio generation. Surpasses DALL-E 3 and Sora on visual generation tasks.",
   paper:"Sun et al., 2024 — Emu3 — arXiv:2409.06940",
   arxiv:"https://arxiv.org/abs/2409.06940",badge:"🔴",diff:"Advanced",categories:[2,6],
   bench:[{m:"Emu3",metric:"GenEval",ds:"Generative",v:"86%",n:"text-to-image"}]},
  {id:122,name:"MobileVLM (ONNX Runtime)",cn:"MobileVLM 移动端VLM",
   desc_cn:"在移动端NPU/边缘GPU上运行的开源VLM，1.4B/1.7B/3B参数。通过知识蒸馏和量化，实现iPhone 14上~30 tok/s的推理速度。",
   desc_en:"Open-source VLM running on mobile NPU / edge GPU. 1.4B/1.7B/3B params. Via knowledge distillation + quantization achieves ~30 tok/s on iPhone 14.",
   paper:"Ji et al., 2024 — MobileVLM — arXiv:2312.11286",
   arxiv:"https://arxiv.org/abs/2312.11286",badge:"🟢",diff:"Beginner",categories:[4],
   bench:[{m:"MobileVLM-3B",metric:"Speed",ds:"iPhone 14",v:"30 tok/s",n:"edge inference"}]},
  {id:123,name:"ControlNet (Conditioning)",cn:"ControlNet 条件化图像生成",
   desc_cn:"通过零卷积层将额外条件（Canny边缘、深度图、骨骼姿态等）注入Stable Diffusion，控制生成图像的几何结构而不损失创造性。",
   desc_en:"Injects extra conditions (Canny edges, depth maps, skeletal poses) into Stable Diffusion via zero convolutions. Controls geometry without sacrificing creativity.",
   paper:"Zhang et al., 2023 — ControlNet — CVPR 2023 — arXiv:2302.05543",
   arxiv:"https://arxiv.org/abs/2302.05543",badge:"🟢",diff:"Beginner",categories:[6],
   bench:[{m:"ControlNet",metric:"Human Eval",ds:"Canny",v:"91%",n:"pose-to-image"}]},
  {id:124,name:"CogVideoX (THUDM)",cn:"CogVideoX 视觉-语言视频生成",

   desc_en:"Chinese open-source video generation VLM. Tokenizes video content then generates via transformer. 5B params supports 16s video. Open-Sora Plan is similar.",
   paper:"Zhu et al., 2024 — CogVideoX — arXiv:2408.02072",
   arxiv:"https://arxiv.org/abs/2408.02072",badge:"🟡",diff:"Intermediate",categories:[7],
   bench:[{m:"CogVideoX-5B",metric:"VBench",ds:"5B",v:"85.3%",n:"16s video gen"}]},
  {id:125,name:"VideoPoet (Google)",cn:"VideoPoet 视频生成VLM",
   desc_cn:"Google的多模态视频生成VLM，支持文本/图像/视频到视频的生成。VideoPoet使用large-scale VLM而非diffusion，在视频质量上具有竞争力。",
   desc_en:"Google's multimodal video generation VLM. Supports text/image/video-to-video generation. Uses large-scale VLM (not diffusion) — competitive video quality.",
   paper:"K Conditions et al., 2024 — VideoPoet — arXiv:2401.12177",
   arxiv:"https://arxiv.org/abs/2401.12177",badge:"🔴",diff:"Advanced",categories:[7],
   bench:[{m:"VideoPoet L",metric:"VBench",ds:"Large",v:"87.2%",n:"text-to-video"}]},
  {id:126,name:"Stable Diffusion 3 (SD3)",cn:"Stable Diffusion 3 MM-DiT",
   desc_cn:"MM-DiT架构（多模态Diffusion Transformer），替代UNet成为SD3的核心。参数量2B/5B/8B，通过流匹配（flow matching）训练，在文字渲染和复杂构图上显著超越SDXL。",
   desc_en:"MM-DiT (Multimodal Diffusion Transformer) architecture replaces UNet in SD3. 2B/5B/8B params. Trained with flow matching. Dramatically better text rendering and complex composition than SDXL.",
   paper:"Esser et al., 2024 — SD3 — arXiv:2403.03206",
   arxiv:"https://arxiv.org/abs/2403.03206",badge:"🟡",diff:"Intermediate",categories:[6],
   bench:[{m:"SD3 8B",metric:"GenEval",ds:"8B",v:"83%",n:"overall text-to-image"}]},
  {id:127,name:"Video Diffusion Transformers (DiT)",cn:"Video DiT 视频Diffusion Transformer",

   desc_en:"Extends DiT architecture to video generation with space-time separated attention. Open-Sora and Latte are open-source implementations. Surpasses GAN-based video generation.",
   paper:"卿 et al., 2024 — Video DiT — arXiv:2402.14777",
   arxiv:"https://arxiv.org/abs/2402.14777",badge:"🟡",diff:"Intermediate",categories:[6,7],
   bench:[{m:"Open-Sora 72B",metric:"VBench",ds:"72B",v:"89%",n:"text-to-video"}]},
  {id:128,name:"PixArt-α / σ (T2I DiT)",cn:"PixArt-α / σ 图像DiT",
   desc_cn:"用DiT替代LDM中的UNet，SD3之前最成功的T2I DiT架构。PixArt-σ进一步引入虎跃注意力机制，FID媲美DALL-E 3但推理速度快~5倍。",
   desc_en:"DiT replaces UNet in LDM. Most successful T2I DiT before SD3. PixArt-σ adds Cross-Spatial Attention, FID competitive with DALL-E 3 but ~5x faster inference.",
   paper:"Chen et al., 2024 — PixArt-α — arXiv:2310.00426; 2024 — PixArt-σ",
   arxiv:"https://arxiv.org/abs/2310.00426",badge:"🟡",diff:"Intermediate",categories:[6],
   bench:[{m:"PixArt-σ 900M",metric:"MSCOCO FID",ds:"900M",v:"7.6",n:"vs SDXL 23.9"}]},

function lang(){return curLang;}
function badgeClass(b){return b==='🟢'?'bg':b==='🟡'?'by':'br';}

function catLabel(id){
  const t=TOPICS[curTopic];
  const c=t.cats.find(x=>x.id===id);
  if(!c)return id;
  return curLang===L.CN?c.labelCN:c.labelEN;
}

function updateHero(){
  const t=TOPICS[curTopic];
  const heroT=t.labelCN+' | '+t.labelEN;
  document.getElementById('heroTitle').innerHTML=`<span class="accent">${heroT}</span>`;
  const isCN=curLang===L.CN;
  document.getElementById('heroDesc').textContent=isCN?t.heroCN:t.heroEN;
  const catN=t.cats.length;
  const techN=t.techs.length;
  document.getElementById('heroCat').textContent=(isCN?`${catN} ${catN>=10?'大':'小'}类别`:(isCN?t.heroCatCN:t.heroCatEN));
  if(curTopic==='llm') document.getElementById('heroCat').textContent=isCN?'14 大类别':'14 Categories';
  if(curTopic==='vlm') document.getElementById('heroCat').textContent=isCN?'8 大类别':'8 Categories';
  if(curTopic==='vla') document.getElementById('heroCat').textContent=isCN?'8 大类别':'8 Categories';
  if(curTopic==='world') document.getElementById('heroCat').textContent=isCN?'8 大类别':'8 Categories';
  document.getElementById('heroTech').textContent=`${techN} ${isCN?'项技术':'techniques'}`;
  document.getElementById('heroPapers').textContent=isCN?'论文':'Papers';
  document.getElementById('heroBench').textContent=isCN?'Benchmark对比':'Benchmarks';
  const f=isCN?t.footerCN:t.footerEN;
  document.getElementById('footerText').textContent=f;
  // title

}

// ── BUILD PAGE ──
function buildPage(){
  const t=TOPICS[curTopic];
  // TOC
  const tg=document.getElementById('tocGrid');
  tg.innerHTML='';
  t.cats.forEach(c=>{
    const a=document.createElement('a');
    a.className='toc-item';
    a.href=`#cat${c.id}`;
    a.innerHTML=`<span style="background:${c.color}18;color:${c.color};border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0">${c.id}</span><span style="font-weight:600;font-size:0.78rem">${curLang===L.CN?c.labelCN:c.labelEN}</span>`;
    tg.appendChild(a);
  });
  // toc title
  document.getElementById('tocTitle').textContent=curLang===L.CN?T.tocTitleCN:T.tocTitleEN;
  // cat filters
  const cf=document.getElementById('catFilters');
  cf.innerHTML='';
  const ab=document.createElement('button');
  ab.className='cat-btn active'; ab.dataset.cat='all';
  ab.textContent=curLang===L.CN?T.allBtnCN:T.allBtnEN;
  cf.appendChild(ab);
  t.cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'; b.dataset.cat=c.id;
    b.textContent=curLang===L.CN?c.labelCN:c.labelEN;
    b.style.borderColor='rgba(255,255,255,0.08)';
    cf.appendChild(b);
  });
  // sections
  const sec=document.getElementById('sections');
  sec.innerHTML='';
  t.cats.forEach(c=>{
    const s=document.createElement('div');
    s.className='section';
    s.id=`cat${c.id}`;
    s.innerHTML=`
      <div class="cat-header">
        <div class="cat-icon" style="background:${c.color}18;color:${c.color}"><i class="fas ${c.icon}"></i></div>
        <div class="cat-info">
          <div class="cat-title"><span style="color:${c.color}">${c.id}.</span> ${curLang===L.CN?c.labelCN:c.labelEN}</div>
          <div class="cat-desc">${c.subTopics.map(st=>`<span class="subpill">${st}</span>`).join('')}</div>
        </div>
      </div>
      <div class="cards" id="cards${c.id}"></div>`;
    sec.appendChild(s);
    const cc=document.getElementById(`cards${c.id}`);
    const items=t.techs.filter(tech=>tech.categories.includes(c.id));
    items.forEach(tech=>{
      const card=document.createElement('div');
      card.className='card';
      card.dataset.cat=c.id;
      card.dataset.techId=tech.id;
      card.dataset.keywords=`${tech.name} ${tech.cn} ${tech.paper||''}`.toLowerCase();
      const title=curLang===L.CN?tech.cn:tech.name;
      const desc=curLang===L.CN?tech.desc_cn:tech.desc_en;
      const hint=curLang===L.CN?T.clickCN:T.clickEN;
      card.innerHTML=`
        <div class="card-head">
          <div class="card-title">${title}</div>
          <span class="card-badge ${badgeClass(tech.badge)}">${tech.badge} ${tech.diff}</span>
        </div>
        <div class="card-desc">${desc.substring(0,95)}${desc.length>95?'…':''}</div>
        <div class="card-ref">${(curLang===L.CN?tech.paper.split('—')[0]:tech.paper.split('—')[0]).trim()}</div>
        <div class="card-hint"><i class="fas fa-external-link-alt" style="font-size:0.58rem"></i>${hint}</div>
        <div class="card-tags">${tech.categories.map(cid=>`<span class="ctag">#${catLabel(cid).substring(0,7)}</span>`).join('')}</div>`;
      card.addEventListener('click',()=>openModal(tech));
      cc.appendChild(card);
    });
  });
}

// ── MODAL ──
function openModal(tech){
  const ov=document.getElementById('modalOverlay');
  const mc=document.getElementById('modalContent');
  const title=curLang===L.CN?tech.cn:tech.name;
  const desc=curLang===L.CN?tech.desc_cn:tech.desc_en;
  const paperParts=tech.paper.split('—');
  const venue=paperParts.length>1?paperParts[1].trim():'';
  mc.innerHTML=`
    <span class="modal-badge ${badgeClass(tech.badge)}">${tech.badge} ${tech.diff}</span>
    <div class="modal-ptitle">${title}</div>
    <div class="modal-div"></div>
    <div class="modal-label">${curLang===L.CN?'技术描述':'Description'}</div>
    <div class="modal-text">${desc}</div>
    <div class="modal-div"></div>
    <div class="modal-label">${curLang===L.CN?'引用论文':'Citation'}</div>
    <div class="modal-paper">
      <div class="modal-pub">
        <i class="fas fa-file-lines modal-picon"></i>
        <div>
          <div class="modal-pname">${tech.paper}</div>
          ${venue?`<div class="modal-pvenue">${venue}</div>`:''}
        </div>
      </div>
    </div>
    ${tech.arxiv?`<a class="modal-btn" href="${tech.arxiv}" target="_blank"><i class="fas fa-external-link-alt"></i>${curLang===L.CN?'在 arXiv 打开':'Open on arXiv ↗'}</a>`:''}
    <div class="modal-div"></div>
    <div class="modal-label">${curLang===L.CN?'所属类别':'Categories'}</div>
    <div class="modal-tags2">${tech.categories.map(cid=>`<span class="modal-ctag" style="border-left:2px solid ${TOPICS[curTopic].cats.find(c=>c.id===cid)?.color||'var(--accent)'}">${catLabel(cid)}</span>`).join('')}</div>
    ${tech.bench&&tech.bench.length>0?`<div class="modal-div"></div><div class="modal-label">Benchmark</div><table class="bench-table"><thead><tr><th>模型</th><th>指标</th><th>数据集</th><th>结果</th><th>备注</th></tr></thead><tbody>${tech.bench.map(b=>`<tr><td>${b.m}</td><td>${b.metric}</td><td>${b.ds}</td><td>${b.v}</td><td>${b.n}</td></tr>`).join('')}</tbody></table>`:''}
    <div class="modal-div"></div>
    <div class="modal-label">${curLang===L.CN?'同类技术':'Related Techniques'}</div>
    <div class="modal-related">${tech.categories.flatMap(cid=>{
      const related=TOPICS[curTopic].techs.filter(t=>t.categories.includes(cid)&&t.id!==tech.id).slice(0,3);
      return related.map(t=>`<div class="modal-rel-item" data-id="${t.id}"><span class="modal-rel-title">${curLang===L.CN?t.cn:t.name}</span><span class="modal-rel-badge ${badgeClass(t.badge)}">${t.badge}</span></div>`);
    }).slice(0,6).join('')}${tech.categories.flatMap(cid=>TOPICS[curTopic].techs.filter(t=>t.categories.includes(cid)&&t.id!==tech.id)).length>6?`<div class="modal-rel-more">+${tech.categories.flatMap(cid=>TOPICS[curTopic].techs.filter(t=>t.categories.includes(cid)&&t.id!==tech.id)).length-6} ${curLang===L.CN?'项技术':'more'}</div>`:''}</div>
    ${(()=>{
      // Cross-topic references: find related techniques in other topics
      const kw=`${tech.name} ${tech.cn} ${tech.desc_cn} ${tech.desc_en}`.toLowerCase();
      const stopWords=new Set(['model','training','efficiency','method','for','the','and','with','based','using']);
      const words=kw.split(/\W+/).filter(w=>w.length>3&&!stopWords.has(w));
      const otherTopics=['vlm','vla','world'].filter(t=>t!==curTopic);
      const crossRefs=[];
      for(const ot of otherTopics){
        const matches=TOPICS[ot].techs.filter(t=>{
          const tkw=`${t.name} ${t.cn} ${t.desc_cn} ${t.desc_en}`.toLowerCase();
          return words.some(w=>tkw.includes(w));
        }).slice(0,4);
        if(matches.length>0){
          crossRefs.push({topic:ot,items:matches,label:TOPICS[ot].labelEN.split(' ')[0]});
        }
      }
      if(crossRefs.length===0)return'';
      return`<div class="modal-div"></div><div class="modal-label">${curLang===L.CN?'其他主题相关':'Also in Other Topics'}</div><div class="modal-cross-topics">${crossRefs.map(r=>`<div class="modal-cross-topic">
        <div class="modal-cross-topic-label">${r.label}:</div>
        ${r.items.map(t=>`<div class="modal-cross-item" data-topic="${r.topic}" data-id="${t.id}">
          <span>${curLang===L.CN?t.cn:t.name}</span>
          <span class="modal-cross-badge ${badgeClass(t.badge)}">${t.badge}</span>
        </div>`).join('')}
      </div>`).join('')}</div>`;
    })()}
  `;
  ov.classList.add('open');
  // Wire related tech clicks
  mc.querySelectorAll('.modal-rel-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const id=parseInt(item.dataset.id);
      const t=TOPICS[curTopic].techs.find(x=>x.id===id);
      if(t){openModal(t);}
    });
  });
  mc.querySelectorAll('.modal-cross-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const topic=item.dataset.topic;
      const id=parseInt(item.dataset.id);
      document.getElementById('modalOverlay').classList.remove('open');
      switchTopic(topic);
      setTimeout(()=>{
        const card=document.querySelector(`.card[data-tech-id="${id}"]`);
        if(card){card.click();}
        else{openModal(TOPICS[topic].techs.find(t=>t.id===id));}
      },80);
    });
  });
}
document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('open'));
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('modalOverlay').classList.remove('open');document.getElementById('tagModalOverlay').classList.remove('open');}});

// ── BENCHMARK QUERY PARSING ──
function parseBenchmarkQuery(q){
  const m=q.match(/([a-z%\/\s]+)\s*(>=|<=|>|<)\s*([\d.]+)/i);
  if(!m)return null;
  return{metric:m[1].trim().toLowerCase(),op:m[2],val:parseFloat(m[3])};
}
function matchesBenchmark(tech,bq){
  if(!bq||!tech.bench)return true;
  for(const b of tech.bench){
    const bm=b.metric.toLowerCase();
    const contains=bm.includes(bq.metric)||bq.metric.includes(bm);
    if(!contains)continue;
    const numMatch=b.v.match(/([\d.]+)/);
    if(!numMatch)continue;
    const num=parseFloat(numMatch[1]);
    let pass=false;
    if(bq.op==='>')pass=num>bq.val;
    else if(bq.op==='<')pass=num<bq.val;
    else if(bq.op==='>=')pass=num>=bq.val;
    else if(bq.op==='<=')pass=num<=bq.val;
    if(pass)return true;
  }
  return false;
}

// ── DO FILTER ──
function doFilter(){
  if(curSubTab!=='main')return;
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const bq=parseBenchmarkQuery(q);
  const cat=document.querySelector('.cat-btn.active')?.dataset.cat||'all';
  const benchInd=document.getElementById('benchFilterInd');
  benchInd.classList.toggle('active',!!bq);
  benchInd.querySelector('span').textContent=bq?`${bq.metric} ${bq.op} ${bq.val}${bq.metric.includes('speedup')||bq.metric.includes('throughput')||bq.val>10?'x':'%'}`:'';
  let visibleCount=0;
  document.querySelectorAll('.card').forEach(card=>{
    const id=parseInt(card.dataset.techId||0);
    const tech=TOPICS[curTopic].techs.find(x=>x.id===id)||{};
    const matchCat=cat==='all'||card.dataset.cat===cat;
    const matchQ=!q||!bq?card.dataset.keywords.includes(q):true;
    const matchBench=matchesBenchmark(tech,bq);
    const visible=matchCat&&matchQ&&matchBench;
    card.classList.toggle('hidden',!visible);
    if(visible)visibleCount++;
  });
  document.querySelectorAll('.section').forEach(sec=>{
    sec.classList.toggle('hidden',sec.querySelectorAll('.card:not(.hidden)').length===0);
  });
  // Update count in hero
  const cntEl=document.getElementById('heroFiltered');
  const hasFilter=q||bq||cat!=='all';
  if(cntEl){
    cntEl.style.display=hasFilter?'inline-flex':'none';
    const span=cntEl.querySelector('span');
    if(span) span.textContent=`${visibleCount} ${curLang===L.CN?'项可见':'visible'}`;
  }
  // No results state
  const noRes=document.getElementById('noResults');
  const sec=document.getElementById('sections');
  if(noRes&&sec){
    const totalCards=sec.querySelectorAll('.card').length;
    noRes.style.display=visibleCount===0&&totalCards>0?'block':'none';
    const noText=document.getElementById('noResultsText');
    const noHint=document.getElementById('noResultsHint');
    if(noText) noText.textContent=curLang===L.CN?'未找到匹配的技术':'No matching techniques found';
    if(noHint) noHint.textContent=curLang===L.CN?'尝试调整搜索词或筛选条件':'Try adjusting your search or filter criteria';
    sec.style.display=visibleCount===0&&totalCards>0?'none':'block';
  }
}

const si=document.getElementById('searchInput');
si.addEventListener('input',doFilter);

// ── CAT FILTER BUTTONS ──
document.addEventListener('click',e=>{
  if(e.target.matches('.cat-btn')){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    doFilter();
  }
});

// ── RENDER BENCHMARKS ──
function renderBenchmarks(){
  const t=TOPICS[curTopic];
  const bt=document.getElementById('benchTabs');
  bt.innerHTML='';
  const bData=t.benches;
  if(!bData||Object.keys(bData).length===0){
    bt.innerHTML='<span style="color:var(--text3);font-size:0.8rem">暂无排行榜数据</span>';
    document.getElementById('benchContent').innerHTML='';
    return;
  }
  const firstCat=Object.keys(bData)[0];
  activeBenchCat=parseInt(firstCat);
  Object.entries(bData).forEach(([cid,bd])=>{
    const btn=document.createElement('button');
    btn.className='bench-tab'+(parseInt(cid)===activeBenchCat?' active':'');
    btn.dataset.cat=cid;
    btn.textContent=curLang===L.CN?bd.titleCN:bd.titleEN;
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.bench-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeBenchCat=parseInt(cid);
      renderBenchContent();
    });
    bt.appendChild(btn);
  });
  renderBenchContent();
}

function renderBenchContent(){
  const t=TOPICS[curTopic];
  const bd=t.benches[activeBenchCat];
  if(!bd){document.getElementById('benchContent').innerHTML='';return;}
  const src=curLang===L.CN?T.benchSourceCN:T.benchSourceEN;
  document.getElementById('benchContent').innerHTML=`
    <div class="bench-source">📊 ${curLang===L.CN?'指标':'Metric'}: ${curLang===L.CN?bd.metricCN:bd.metricEN} · ${src}</div>
    <div class="bar-chart">
      ${bd.items.map(item=>{
        const max=Math.max(...bd.items.map(i=>i.val));
        const pct=(item.val/max*100).toFixed(1);
        return`<div class="bar-row">
          <div class="bar-label" title="${item.name}">${item.name}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${item.color}"><span>${item.val}${bd.unit&&bd.unit!==''?' '+bd.unit:''}</span></div></div>
          <div class="bar-value">${item.note}</div>
        </div>`;}).join('')}
    </div>`;
}

// ── RENDER TAGS ──
function renderTags(){
  const t=TOPICS[curTopic];
  const tg=document.getElementById('tagsGrid');
  tg.innerHTML='';
  t.cats.forEach(c=>{
    const items=t.techs.filter(tech=>tech.categories.includes(c.id));
    if(items.length===0)return;
    const card=document.createElement('div');
    card.className='tag-card';
    card.innerHTML=`
      <div class="tag-card-head">
        <span class="tag-name" style="color:${c.color}">${curLang===L.CN?c.labelCN:c.labelEN}</span>
        <span class="tag-count">${items.length} ${curLang===L.CN?'项':'techs'}</span>
      </div>
      <div class="tag-items">${items.slice(0,6).map(tech=>`<span class="tag-item-chip">${curLang===L.CN?tech.cn:tech.name}</span>`).join('')}${items.length>6?`<span class="tag-item-chip" style="color:var(--accent)">+${items.length-6}</span>`:''}</div>
    `;
    card.addEventListener('click',()=>openTagModal(c,items));
    tg.appendChild(card);
  });
}

function openTagModal(cat,items){
  const ov=document.getElementById('tagModalOverlay');
  const mc=document.getElementById('tagModalContent');
  mc.innerHTML=`
    <h3 style="color:${cat.color}">${curLang===L.CN?cat.labelCN:cat.labelEN}</h3>
    <div style="font-size:0.75rem;color:var(--text3);margin-bottom:14px">${items.length} ${curLang===L.CN?'项技术':'techniques'} · ${curLang===L.CN?'点击查看详情':'Click to view details'}</div>
    <div class="tag-modal-list">
      ${items.map(tech=>`<div class="tag-modal-item" data-id="${tech.id}">
        <span style="font-weight:700">${curLang===L.CN?tech.cn:tech.name}</span>
        <span style="color:var(--text3);font-size:0.7rem;margin-left:8px">${tech.name!==tech.cn?(curLang===L.CN?tech.name:tech.cn):''}</span>
      </div>`).join('')}
    </div>
  `;
  mc.querySelectorAll('.tag-modal-item').forEach(item=>{
    item.addEventListener('click',()=>{
      const id=parseInt(item.dataset.id);
      const tech=TOPICS[curTopic].techs.find(x=>x.id===id);
      if(tech){closeTagModal();switchSubTab('main');openModal(tech);}
    });
  });
  ov.classList.add('open');
}
function closeTagModal(){document.getElementById('tagModalOverlay').classList.remove('open');}
document.getElementById('tagModalClose').addEventListener('click',closeTagModal);
document.getElementById('tagModalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('tagModalOverlay'))closeTagModal();});

// ── SUB-TAB SWITCHING ──
function switchSubTab(tab){
  curSubTab=tab;
  document.getElementById('sections').style.display=tab==='main'?'block':'none';
  document.getElementById('toc').style.display=tab==='main'?'block':'none';
  document.getElementById('benchmarks-page').classList.toggle('active',tab==='bench');
  document.getElementById('tags-page').classList.toggle('active',tab==='tags');
  document.querySelectorAll('.subtab-btn').forEach(b=>b.classList.toggle('active',b.dataset.subtab===tab));
  if(tab==='bench')renderBenchmarks();
  if(tab==='tags')renderTags();
}

document.querySelectorAll('.subtab-btn').forEach(b=>{
  b.addEventListener('click',()=>switchSubTab(b.dataset.subtab));
});

// ── TOPIC SWITCHING ──
function switchTopic(topic){
  curTopic=topic;
  curSubTab='main';
  document.querySelectorAll('.topic-tab').forEach(t=>t.classList.toggle('active',t.dataset.topic===topic));
  updateHero();
  updateSearchPH();
  buildPage();
  document.getElementById('sections').style.display='block';
  document.getElementById('toc').style.display='block';
  document.getElementById('benchmarks-page').classList.remove('active');
  document.getElementById('tags-page').classList.remove('active');
  document.querySelectorAll('.subtab-btn').forEach(b=>b.classList.toggle('active',b.dataset.subtab==='main'));
  si.value='';
  doFilter();
}

document.querySelectorAll('.topic-tab').forEach(t=>{
  t.addEventListener('click',()=>switchTopic(t.dataset.topic));
});

// ── LANG SWITCH ──
document.getElementById('langCN').addEventListener('click',()=>{
  curLang=L.CN;
  document.getElementById('langCN').classList.add('active');
  document.getElementById('langEN').classList.remove('active');
  document.getElementById('subtabMainLabel').textContent=T.tabMainCN;
  document.getElementById('subtabBenchLabel').textContent=T.benchTabCN;
  document.getElementById('subtabTagsLabel').textContent=T.tagsTabCN;
  document.getElementById('tagSearchInput').placeholder=T.tagSearchPHCN;
  updateHero(); updateSearchPH();
  buildPage();
  if(curSubTab==='bench')renderBenchmarks();
  if(curSubTab==='tags')renderTags();
  doFilter();
});
document.getElementById('langEN').addEventListener('click',()=>{
  curLang=L.EN;
  document.getElementById('langEN').classList.add('active');
  document.getElementById('langCN').classList.remove('active');
  document.getElementById('subtabMainLabel').textContent=T.tabMainEN;
  document.getElementById('subtabBenchLabel').textContent=T.benchTabEN;
  document.getElementById('subtabTagsLabel').textContent=T.tagsTabEN;
  document.getElementById('tagSearchInput').placeholder=T.tagSearchPHEN;
  updateHero(); updateSearchPH();
  buildPage();
  if(curSubTab==='bench')renderBenchmarks();
  if(curSubTab==='tags')renderTags();
  doFilter();
});

// ── TAG SEARCH ──
let tagSearchQ='';
document.getElementById('tagSearchInput').addEventListener('input',(e)=>{
  tagSearchQ=e.target.value.toLowerCase().trim();
  renderTagsFiltered();
});
function renderTagsFiltered(){
  if(tagSearchQ){
    // Filter tags by search query
    const t=TOPICS[curTopic];
    const tg=document.getElementById('tagsGrid');
    const query=tagSearchQ;
    const filtered=t.cats.filter(c=>{
      const nameCN=c.labelCN.toLowerCase();
      const nameEN=c.labelEN.toLowerCase();
      return nameCN.includes(query)||nameEN.includes(query)||
        t.techs.some(tech=>tech.categories.includes(c.id)&&
        (tech.name.toLowerCase().includes(query)||tech.cn.toLowerCase().includes(query)));
    });
    tg.innerHTML='';
    filtered.forEach(c=>{
      const items=t.techs.filter(tech=>tech.categories.includes(c.id)&&
        (tech.name.toLowerCase().includes(query)||tech.cn.toLowerCase().includes(query)));
      const card=document.createElement('div');
      card.className='tag-card';
      card.innerHTML=`
        <div class="tag-card-head">
          <span class="tag-name" style="color:${c.color}">${curLang===L.CN?c.labelCN:c.labelEN}</span>
          <span class="tag-count">${items.length} ${curLang===L.CN?'项':'techs'}</span>
        </div>
        <div class="tag-items">${items.slice(0,8).map(tech=>`<span class="tag-item-chip">${curLang===L.CN?tech.cn:tech.name}</span>`).join('')}${items.length>8?`<span class="tag-item-chip" style="color:var(--accent)">+${items.length-8}</span>`:''}</div>
      `;
      card.addEventListener('click',()=>openTagModal(c,items));
      tg.appendChild(card);
    });
  } else {
    renderTags();
  }
}

// ── INIT ──
buildPage();
updateHero();
updateSearchPH();
document.getElementById('tagSearchInput').placeholder=T.tagSearchPHCN;

// ── BACK TO TOP ──
window.addEventListener('scroll',()=>{
  const btn=document.getElementById('backToTop');
  btn.style.display=window.scrollY>400?'flex':'none';
});
document.getElementById('backToTop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
